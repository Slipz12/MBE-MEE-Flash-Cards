<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#151618">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bar Prep">
<title>Bar Prep Flashcards</title>
<style>
  :root {
    --bg: #151618;
    --surface: #1e2024;
    --surface-2: #262930;
    --border: #2e323a;
    --border-strong: #3a3e47;
    --text: #E8E5DE;
    --text-dim: #9a9ba4;
    --text-faint: #62646d;
    --accent: #d4a860;      /* muted amber — star */
    --flag: #c46a5a;        /* muted red-orange — flag */
    --focus: #6b8fb5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  #app {
    min-height: 100dvh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    display: flex;
    flex-direction: column;
  }

  /* Screen frame */
  .screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px 20px 24px;
    max-width: 640px;
    margin: 0 auto;
    width: 100%;
    min-height: 0;
  }
  .top-bar {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    min-height: 36px;
  }
  .top-bar h1 {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.005em;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .top-bar .left { justify-self: start; }
  .top-bar .right { justify-self: end; }
  .link-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 14px;
    padding: 8px 4px;
    cursor: pointer;
    font-family: inherit;
    min-height: 44px;
    display: inline-flex;
    align-items: center;
  }
  .link-btn:hover { color: var(--text); }
  .link-btn:active { color: var(--text); }

  /* Home page title */
  .page-title {
    font-family: Georgia, "Iowan Old Style", "Times New Roman", serif;
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -0.015em;
    margin: 8px 0 4px;
  }
  .page-subtitle {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 28px;
  }

  /* Section headers and lists */
  .section-label {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin: 4px 4px 10px;
    font-weight: 600;
  }
  .list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }
  .list-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 15px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    cursor: pointer;
    color: var(--text);
    font-family: inherit;
    text-align: left;
    width: 100%;
    transition: background 0.12s, border-color 0.12s;
  }
  .list-item:hover { background: var(--surface-2); border-color: var(--border-strong); }
  .list-item:active { background: var(--surface-2); }
  .list-item.disabled {
    opacity: 0.4;
    cursor: default;
    pointer-events: none;
  }
  .list-item .name { font-size: 15px; font-weight: 500; }
  .list-item .count { font-size: 13px; color: var(--text-dim); font-variant-numeric: tabular-nums; }

  /* Card view */
  .card-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    font-size: 13px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    min-height: 20px;
  }
  .subject-tag {
    color: var(--accent);
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .card-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 1200px;
    padding: 4px 0;
    min-height: 0;
  }
  .card {
    position: relative;
    width: 100%;
    height: min(58dvh, 480px);
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.2, 0.8, 0.2, 1);
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px 26px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .card-front {
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  .card-back {
    transform: rotateY(180deg);
    justify-content: flex-start;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .term {
    font-family: Georgia, "Iowan Old Style", "Times New Roman", serif;
    font-size: clamp(24px, 5.5vw, 34px);
    font-weight: 500;
    letter-spacing: -0.015em;
    line-height: 1.25;
    color: var(--text);
  }
  .back-content {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
  }
  .back-item {
    font-size: 15.5px;
    line-height: 1.6;
    color: var(--text);
    padding-left: 20px;
    position: relative;
  }
  .back-item::before {
    content: "";
    position: absolute;
    left: 4px;
    top: 0.75em;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-faint);
  }
  .back-item strong { font-weight: 600; color: var(--text); }
  .back-item em { font-style: italic; color: var(--text); }
  .flip-hint {
    position: absolute;
    bottom: 14px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    pointer-events: none;
  }

  /* Action bar */
  .action-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-top: 16px;
  }
  .action-group { display: flex; gap: 8px; }
  .icon-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 10px;
    padding: 10px 14px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    min-height: 44px;
    min-width: 44px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-family: inherit;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
  }
  .icon-btn:hover { background: var(--surface-2); color: var(--text); }
  .icon-btn.active[data-role="star"] {
    color: var(--accent);
    border-color: var(--accent);
    background: color-mix(in srgb, var(--accent) 10%, var(--surface));
  }
  .icon-btn.active[data-role="flag"] {
    color: var(--flag);
    border-color: var(--flag);
    background: color-mix(in srgb, var(--flag) 10%, var(--surface));
  }
  .nav-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 10px 16px;
    cursor: pointer;
    font-size: 14px;
    min-height: 44px;
    font-weight: 500;
    font-family: inherit;
    transition: background 0.12s, border-color 0.12s;
  }
  .nav-btn:hover { background: var(--surface-2); border-color: var(--border-strong); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  /* Empty state */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    flex: 1;
    color: var(--text-dim);
    padding: 40px 20px;
    gap: 12px;
  }
  .empty .empty-title {
    color: var(--text);
    font-size: 16px;
    font-weight: 500;
  }
  .empty p {
    max-width: 320px;
    font-size: 14px;
    line-height: 1.55;
  }

  /* Focus */
  button:focus-visible, .list-item:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }

  @media (max-width: 400px) {
    .screen { padding: 16px 16px 20px; }
    .card-face { padding: 26px 20px; }
    .icon-btn { padding: 10px 12px; font-size: 13px; }
    .nav-btn { padding: 10px 14px; font-size: 13px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .card { transition: none; }
    .list-item, .icon-btn, .nav-btn { transition: none; }
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ============================================================
// CARD DATA
// Format: each entry becomes one card.
//   subject: which deck the card lives in
//   front:   the term shown on the front
//   back:    array of strings — each becomes a bullet on the back
//            (from the "o" sub-bullets in the Themis outline)
// New sets can be appended to RAW_CARDS as they're built out.
// ============================================================
const SUBJECTS = [
  "Evidence",
  "Civil Procedure",
  "Constitutional Law",
  "Contracts",
  "Torts",
  "Real Property",
  "Criminal Law & Procedure",
  "Business Associations"
];

const RAW_CARDS = [
  {
    subject: "Evidence",
    front: "Relevance",
    back: [
      "Evidence must probative (tending to make a fact more or less probable) and",
      "Must be material (not necessarily conclusive, but to a fact at issue)"
    ]
  },
  {
    subject: "Evidence",
    front: "403 Exclusion",
    back: [
      "Court may exclude relevant evidence if its probative value is substantially outweighed by a danger of unfair prejudice, confusing the issues or misleading the jury, or causing unnecessary delay/presentation of cumulative evidence"
    ]
  },
  {
    subject: "Evidence",
    front: "Character Evidence Generally",
    back: [
      "Evidence of an individual’s character trait when offered to show action in conformity therewith",
      "Generally inadmissible, almost always inadmissible in civil",
      "May come in via exception, or for non-character purpose (impeachment, 404b, etc.)"
    ]
  },
  {
    subject: "Evidence",
    front: "Character Evidence in a Criminal Case",
    back: [
      "Defendant may offer evidence of their own pertinent trait (trait at issue) and if they do, the door is opened",
      "Prosecution may then rebut by offering contrary character evidence",
      "Defendant may offer evidence of victim’s pertinent trait, allowing prosecution to rehabilitate or offer evidence that the Defendant has the same trait",
      "In homicide case – prosecution may offer evidence of witness character for peacefulness if alleged to be first aggressor"
    ]
  },
  {
    subject: "Evidence",
    front: "Specific Acts Evidence (404b)",
    back: [
      "Specific act evidence is inadmissible to show action in conformity, but may be admissible for another purpose, such as MOIPPKIAL",
      "*[flag: MIMIC acronym conflates \"plan\" with \"common scheme\"; rule text is motive/opportunity/intent/preparation/plan/knowledge/identity/absence of mistake/lack of accident]*"
    ]
  },
  {
    subject: "Evidence",
    front: "Proving Character",
    back: [
      "Can be done via reputation or opinion testimony",
      "Generally not permitted to use extrinsic evidence to prove a specific act if inquired about under 405a – need GF basis and bound by witness response"
    ]
  },
  {
    subject: "Evidence",
    front: "Habit",
    back: [
      "Evidence of individual’s habit may be admissible to show action in conformity if there is foundation showing routine repetition to specific stimuli"
    ]
  },
  {
    subject: "Evidence",
    front: "Competence",
    back: [
      "Must be competent to testify – if a child, requires knowing value of telling truth",
      "Must testify based on personal knowledge"
    ]
  },
  {
    subject: "Evidence",
    front: "Lay Opinions",
    back: [
      "Must be rationally based on perception of witness and",
      "Helpful to a clear understanding of the witness testimony or determination of fact in issue",
      "Not based on scientific, technical, or specialized knowledge"
    ]
  },
  {
    subject: "Evidence",
    front: "Expert Qualification/Testimony",
    back: [
      "Expert testimony must concern scientific, technical, or other specialized knowledge (reliable) and be helpful to the trier of fact (relevant)",
      "Must be qualified as expert by knowledge/skill/experience/training/education",
      "testimony based on sufficient facts or data",
      "testimony is product of reliable principles and methods",
      "Witness applied those principles and methods reliably to the facts"
    ]
  },
  {
    subject: "Evidence",
    front: "Basis for Expert Opinion",
    back: [
      "Outside of personal observations, must be based upon what other experts in field would reasonable rely upon",
      "even if those are inadmissible, they may be shown to jury if probative value substantially outweighs prejudicial effect",
      "May state opinion without first testifying as to basis of the opinion"
    ]
  },
  {
    subject: "Evidence",
    front: "Past Recollection Refreshed",
    back: [
      "Witness has trouble remembering something, may help by showing them document (or other item) to refresh",
      "If they proceed to testify from memory after refreshing – it’s refreshed and allowed"
    ]
  },
  {
    subject: "Evidence",
    front: "Past Recollection Recorded",
    back: [
      "Hearsay exception and parallel to recollection refreshed",
      "Witness cannot remember after testifying to lack of memory, AND attempted refresh – may then read the notes into evidence if the record made while fresh in witness memory and record is accurate reflection thereof",
      "Does not need to be regularly kep",
      "Not admitted directly into evidence unless demanded by adverse party as exhibit"
    ]
  },
  {
    subject: "Evidence",
    front: "Character for Truthfulness",
    back: [
      "Testifying witness character can be attacked by reputation or opinion testimony as to that witnesses character for dishonesty"
    ]
  },
  {
    subject: "Evidence",
    front: "Impeachment via Specific Acts",
    back: [
      "On cross examination, a witnesses character can be impeached for its truthfulness by reference to the specific acts of that witness, or if they are testifying in support of a party’s character, to the specific acts of that party",
      "No extrinsic is permitted to prove, requires GF basis, bound by witness response"
    ]
  },
  {
    subject: "Evidence",
    front: "Criminal Convictions <10 Years",
    back: [
      "Automatically admissible to impeach if a non-felony, but where the convictions involves proving elements of dishonesty or false statements",
      "If a felony or punishable by more than 1 year in prison, then admissible against a criminal Defendant if the probative value outweighs the prejudicial effect AT ALL, and versus all other witnesses (including civil defendant), admissible unless the adverse party shows the prejudicial effect substantially outweighs its probative value"
    ]
  },
  {
    subject: "Evidence",
    front: "Criminal Conviction >10 years",
    back: [
      "Admissible if probative value substantially outweighs prejudicial effect and",
      "Proponent gives adverse party reasonable written notice of intent to use"
    ]
  },
  {
    subject: "Evidence",
    front: "Criminal Conviction Evidence Timing",
    back: [
      "Note that the timing runs from conviction OR from release, whichever is LATER"
    ]
  },
  {
    subject: "Evidence",
    front: "Juvenile Convictions",
    back: [
      "Admissible only if it would be admissible against the witness if they were of the age of majority and it is essential to the case"
    ]
  },
  {
    subject: "Evidence",
    front: "Prior Inconsistent Statements",
    back: [
      "Evidence of PIS may be used for impeachment purposes regardless of whether it is hearsay",
      "Witness needs a chance to explain or deny the statement first before it can be proven via extrinsic",
      "May also be admissible substantively if the PIS hearsay exception, or another hearsay exception, applies (made under oath while adverse party had opportunity and similar motive to cross-examine)"
    ]
  },
  {
    subject: "Evidence",
    front: "Bias/Interest/Sensory Competence",
    back: [
      "All valid basis for impeachment",
      "May use extrinsic to prove all of them"
    ]
  },
  {
    subject: "Evidence",
    front: "Impeachment by Contradiction",
    back: [
      "Allowed to use extrinsic evidence to impeach by contradiction unless it would be to a collateral matter (trial within a trial)"
    ]
  },
  {
    subject: "Evidence",
    front: "Rehabilitation",
    back: [
      "Once a witness character has been attacked for truthfulness, it may be rehabilitated"
    ]
  },
  {
    subject: "Evidence",
    front: "Authentication Generally",
    back: [
      "Threshold requirement for the court to determine whether there is sufficient evidence for jury to determine that the item is authentic – not that it IS authentic"
    ]
  },
  {
    subject: "Evidence",
    front: "Self-Authenticating Documents",
    back: [
      "Public docs with seal",
      "Certified copies of punlic records",
      "Official publications issued by public authority",
      "Newspaper and periodical",
      "Trade inscription",
      "NOTARIZED DOCS",
      "Commercial paper",
      "Busienss records certified by custodian of records"
    ]
  },
  {
    subject: "Evidence",
    front: "Handwriting",
    back: [
      "Authentication by expert is okay, or by lay witness if familiarity not obtained for purpose of litigation"
    ]
  },
  {
    subject: "Evidence",
    front: "Photograph Auth",
    back: [
      "May be authenticated via personal knowledge that photo fairly and accurate depicts the item or object photographed"
    ]
  },
  {
    subject: "Evidence",
    front: "X-Ray/Machine Auth",
    back: [
      "Need to authenticate by showing that the process is accurate, machine working, operator was qualified and likely requires testimony to that end"
    ]
  },
  {
    subject: "Evidence",
    front: "Best Evidence Rule Applies",
    back: [
      "When the content of an item of evidenceis at issue, or where a witness relies on the content of the document",
      "Then we need the original to prove its contents absent an exception"
    ]
  },
  {
    subject: "Evidence",
    front: "BER Exceptions",
    back: [
      "All Ogs lost or destroyed but not by proponent acting in bad faith",
      "OG cannot be obtained by any judicial process",
      "Party against whom its offered had control of OG, was notice that it would be subject of proof, and failed to produce it at trial or hearing, or",
      "Document is not closely related to controlling issue"
    ]
  },
  {
    subject: "Evidence",
    front: "BER Duplicates",
    back: [
      "May allow duplicated unless the authenticity is questioned or admission would be unfair"
    ]
  },
  {
    subject: "Evidence",
    front: "BER Public Records",
    back: [
      "Certified copy of public record or testimony from the recordkeeper + copy is sufficient"
    ]
  },
  {
    subject: "Evidence",
    front: "Privileges and Diversity",
    back: [
      "If diversity, its state law – so may have doctor patient privilege"
    ]
  },
  {
    subject: "Evidence",
    front: "Atty-Client",
    back: [
      "Applies to statements made for purposes of obtaining legal advice or counsel, applies to past, prospective, and current clients",
      "Requires confidential communication – made with purpose of being confidential – not messed up because agent of attorney is present",
      "Exception where the client later sues the attorney or where dual representation leads to clients suing each other"
    ]
  },
  {
    subject: "Evidence",
    front: "Atty-Client Crime Fraud",
    back: [
      "Won’t apply if advise is used to carry out FUTURE crime or fraud"
    ]
  },
  {
    subject: "Evidence",
    front: "Work Product",
    back: [
      "Protects attorney work product made in anticipation of litigation it is shown by the other party that disclosure is necessitated by substantial need for the info and that it can’t be obtained by any other means without undue hardship",
      "Exception wont apply to mental impressions, conclusions, or trial strategy notes"
    ]
  },
  {
    subject: "Evidence",
    front: "Inadvertent Waiver",
    back: [
      "Claw-Back exception, waiver unintentional despite efforts to maintain confidentiality + prompt efforts to correct",
      "Will override state law even in diversity"
    ]
  },
  {
    subject: "Evidence",
    front: "Doctor-Patient",
    back: [
      "Only in state law and won’t apply when patient places condition directly at issue in suit"
    ]
  },
  {
    subject: "Evidence",
    front: "Psychotherapist-Patient Privilege",
    back: [
      "Wil apply but exception where disclosure is necessary to avoid threat of injury or harm to a specific person"
    ]
  },
  {
    subject: "Evidence",
    front: "Spousal Testimonial Immunity",
    back: [
      "Allows spouse to refuse to testify against other spouse, applying during a valid marriage only – not before or after",
      "Held by testifying spouse"
    ]
  },
  {
    subject: "Evidence",
    front: "Confidential marital Communications",
    back: [
      "Survives divorce and death and will privilege communications made between spouses to a valid marriage",
      "Either spouse holds, can prevent the other from disclosing",
      "Exception where they sue each other"
    ]
  },
  {
    subject: "Evidence",
    front: "5A Priv Against Self Incrimination",
    back: [
      "Only allowed by natural person – not corporation – prevents person from being witness against themselves",
      "Protects them from being compelled to make incriminating statements – applying anywhere",
      "Won’t apply to physical mannerisms or characteristics (like blood samples)",
      "But no risk of incrimination due to immunity invalidates this"
    ]
  },
  {
    subject: "Evidence",
    front: "Hearsay Definition",
    back: [
      "Out of court statement offered to prove the truth of the matter asserted",
      "Generally inadmissible unless it fits an exclusion or exception",
      "Only assertive statements/conduct qualify"
    ]
  },
  {
    subject: "Evidence",
    front: "Assertive Conduct",
    back: [
      "Nonverbal conduct intended as an assertion (pointing, nodding)",
      "Treated as a statement for hearsay purposes",
      "Nonassertive conduct (crying, running) is not hearsay unless intended to communicate"
    ]
  },
  {
    subject: "Evidence",
    front: "Nonhearsay Use — Effect on Listener",
    back: [
      "Statement offered to show effect on the person who heard it (notice, warning, motive, fear)",
      "Classic example: notice statement to defendant that his brakes are faulty"
    ]
  },
  {
    subject: "Evidence",
    front: "Nonhearsay Use — State of Mind (circumstantial)",
    back: [
      "Statement offered as circumstantial evidence of declarant's state of mind, knowledge, or belief"
    ]
  },
  {
    subject: "Evidence",
    front: "Nonhearsay Use — Legally Significant Verbal Act",
    back: [
      "Words that themselves have legal effect (offer, acceptance, defamation, gift, transfer)",
      "The utterance itself is the operative fact, not proof of some external truth"
    ]
  },
  {
    subject: "Evidence",
    front: "Nonhearsay Use — Impeachment",
    back: [
      "PIS offered only to impeach — not substantive",
      "Becomes substantive only if it independently qualifies under 801(d)(1)(A) or an exception"
    ]
  },
  {
    subject: "Evidence",
    front: "Double Hearsay",
    back: [
      "Hearsay within hearsay admissible only if each layer independently qualifies",
      "Analyze each layer separately"
    ]
  },
  {
    subject: "Evidence",
    front: "Prior Inconsistent Statement — Substantive",
    back: [
      "Testifying witness subject to current cross",
      "Prior statement made under oath at a trial, hearing, deposition, or other proceeding",
      "Substantively admissible, not just for impeachment"
    ]
  },
  {
    subject: "Evidence",
    front: "Prior Consistent Statement",
    back: [
      "Testifying witness subject to current cross",
      "Offered to rebut charge of recent fabrication/improper motive/influence and predates the alleged fabrication or motive",
      "Also admissible to rehabilitate credibility on other grounds"
    ]
  },
  {
    subject: "Evidence",
    front: "Prior Statement of Identification",
    back: [
      "Testifying witness subject to current cross",
      "Identifies a person after perceiving them",
      "Substantively admissible"
    ]

// ============================================================
// SETUP: assign stable IDs from subject + front text
// ============================================================
function slugify(str) {
  return str.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
}
const CARDS = RAW_CARDS.map(c => ({
  ...c,
  id: slugify(c.subject) + "--" + slugify(c.front)
}));
const CARDS_BY_ID = Object.fromEntries(CARDS.map(c => [c.id, c]));

// ============================================================
// PERSISTENCE (localStorage)
// ============================================================
const STORAGE = {
  favKey: (subject) => "flashcards_fav_" + slugify(subject),
  flagKey: "flashcards_flagged",
  get(key) {
    try { return JSON.parse(localStorage.getItem(key)) || []; }
    catch { return []; }
  },
  set(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
  },
  toggle(key, id) {
    const arr = this.get(key);
    const i = arr.indexOf(id);
    if (i >= 0) arr.splice(i, 1); else arr.push(id);
    this.set(key, arr);
    return i < 0;
  },
  has(key, id) { return this.get(key).includes(id); }
};

function isFavorited(card) { return STORAGE.has(STORAGE.favKey(card.subject), card.id); }
function isFlagged(card)   { return STORAGE.has(STORAGE.flagKey, card.id); }
function toggleFavorite(card) { return STORAGE.toggle(STORAGE.favKey(card.subject), card.id); }
function toggleFlag(card)     { return STORAGE.toggle(STORAGE.flagKey, card.id); }

// ============================================================
// DECK RETRIEVAL
// ============================================================
function cardsForSubject(subject) { return CARDS.filter(c => c.subject === subject); }
function favoritesForSubject(subject) {
  const ids = STORAGE.get(STORAGE.favKey(subject));
  return ids.map(id => CARDS_BY_ID[id]).filter(Boolean);
}
function flaggedCards() {
  const ids = STORAGE.get(STORAGE.flagKey);
  return ids.map(id => CARDS_BY_ID[id]).filter(Boolean);
}

// ============================================================
// STATE + RENDERING
// ============================================================
const state = {
  view: "home",     // "home" | "subject" | "deck"
  subject: null,
  deckType: null,   // "main" | "favorites" | "flagged"
  cards: [],
  index: 0,
  flipped: false
};

const app = document.getElementById("app");

// Tiny DOM helper
function h(tag, attrs, children) {
  const el = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (v == null || v === false) continue;
      if (k === "class") el.className = v;
      else if (k === "onclick") el.addEventListener("click", v);
      else if (k === "dataset") Object.assign(el.dataset, v);
      else if (k === "disabled") { if (v) el.disabled = true; }
      else if (k in el) el[k] = v;
      else el.setAttribute(k, v);
    }
  }
  if (children != null) {
    for (const child of [].concat(children)) {
      if (child == null || child === false) continue;
      if (typeof child === "string" || typeof child === "number") {
        el.appendChild(document.createTextNode(String(child)));
      } else {
        el.appendChild(child);
      }
    }
  }
  return el;
}

function clearApp() { app.innerHTML = ""; }

function render() {
  if (state.view === "home") renderHome();
  else if (state.view === "subject") renderSubject();
  else renderDeck();
}

// -------------------- HOME --------------------
function renderHome() {
  clearApp();
  const screen = h("div", { class: "screen" });

  screen.appendChild(h("h1", { class: "page-title" }, "Bar Prep"));
  screen.appendChild(h("div", { class: "page-subtitle" }, "Tap a subject to study."));

  screen.appendChild(h("div", { class: "section-label" }, "Subjects"));
  const list = h("div", { class: "list" });
  for (const subject of SUBJECTS) {
    const count = cardsForSubject(subject).length;
    const disabled = count === 0;
    list.appendChild(h("button", {
      class: "list-item" + (disabled ? " disabled" : ""),
      onclick: disabled ? null : () => goToSubject(subject)
    }, [
      h("div", { class: "name" }, subject),
      h("div", { class: "count" }, count + (count === 1 ? " card" : " cards"))
    ]));
  }
  screen.appendChild(list);

  const flaggedCount = flaggedCards().length;
  screen.appendChild(h("div", { class: "section-label" }, "Flagged"));
  const flaggedList = h("div", { class: "list" });
  flaggedList.appendChild(h("button", {
    class: "list-item" + (flaggedCount === 0 ? " disabled" : ""),
    onclick: flaggedCount === 0 ? null : () => goToDeck(null, "flagged")
  }, [
    h("div", { class: "name" }, "All flagged cards"),
    h("div", { class: "count" }, flaggedCount + (flaggedCount === 1 ? " card" : " cards"))
  ]));
  screen.appendChild(flaggedList);

  app.appendChild(screen);
}

// -------------------- SUBJECT --------------------
function renderSubject() {
  clearApp();
  const screen = h("div", { class: "screen" });

  screen.appendChild(h("div", { class: "top-bar" }, [
    h("div", { class: "left" }, [
      h("button", { class: "link-btn", onclick: goHome }, "‹ Home")
    ]),
    h("h1", {}, state.subject),
    h("div", { class: "right" })
  ]));

  const mainCount = cardsForSubject(state.subject).length;
  const favCount = favoritesForSubject(state.subject).length;

  const list = h("div", { class: "list" });
  list.appendChild(h("button", {
    class: "list-item" + (mainCount === 0 ? " disabled" : ""),
    onclick: mainCount === 0 ? null : () => goToDeck(state.subject, "main")
  }, [
    h("div", { class: "name" }, "Full deck"),
    h("div", { class: "count" }, mainCount + (mainCount === 1 ? " card" : " cards"))
  ]));
  list.appendChild(h("button", {
    class: "list-item" + (favCount === 0 ? " disabled" : ""),
    onclick: favCount === 0 ? null : () => goToDeck(state.subject, "favorites")
  }, [
    h("div", { class: "name" }, "Favorites"),
    h("div", { class: "count" }, favCount + (favCount === 1 ? " card" : " cards"))
  ]));
  screen.appendChild(list);
  app.appendChild(screen);
}

// -------------------- DECK / CARD --------------------
function renderDeck() {
  clearApp();
  const screen = h("div", { class: "screen" });

  const isFlaggedDeck = state.deckType === "flagged";
  const backAction = isFlaggedDeck ? goHome : (() => goToSubject(state.subject));
  const backLabel = isFlaggedDeck ? "‹ Home" : "‹ " + state.subject;
  const heading = isFlaggedDeck
    ? "Flagged"
    : (state.deckType === "favorites" ? state.subject + " · Favorites" : state.subject);

  const rightSlot = h("div", { class: "right" });
  if (isFlaggedDeck && state.cards.length > 1) {
    rightSlot.appendChild(h("button", { class: "link-btn", onclick: shuffleDeck }, "Shuffle"));
  }

  screen.appendChild(h("div", { class: "top-bar" }, [
    h("div", { class: "left" }, [
      h("button", { class: "link-btn", onclick: backAction }, backLabel)
    ]),
    h("h1", {}, heading),
    rightSlot
  ]));

  if (state.cards.length === 0) {
    const emptyMsg = isFlaggedDeck
      ? "Flag a card from any deck and it will show up here, across all subjects."
      : (state.deckType === "favorites"
          ? "Star a card in this subject's Full deck and it will show up here."
          : "No cards in this deck yet.");
    screen.appendChild(h("div", { class: "empty" }, [
      h("div", { class: "empty-title" }, "Nothing here yet"),
      h("p", {}, emptyMsg)
    ]));
    app.appendChild(screen);
    return;
  }

  const card = state.cards[state.index];
  const fav = isFavorited(card);
  const flg = isFlagged(card);

  screen.appendChild(h("div", { class: "card-meta" }, [
    isFlaggedDeck ? h("div", { class: "subject-tag" }, card.subject) : h("div", {}),
    h("div", {}, (state.index + 1) + " / " + state.cards.length)
  ]));

  // Build the card faces
  const front = h("div", { class: "card-face card-front" }, [
    h("div", { class: "term" }, card.front),
    h("div", { class: "flip-hint" }, "Tap to flip")
  ]);
  const backContent = h("div", { class: "back-content" });
  for (const line of card.back) {
    const item = h("div", { class: "back-item" });
    item.innerHTML = renderInline(line);
    backContent.appendChild(item);
  }
  const backFace = h("div", { class: "card-face card-back" }, [ backContent ]);

  const cardEl = h("div", {
    class: "card" + (state.flipped ? " flipped" : ""),
    onclick: flipCard,
    role: "button",
    "aria-label": "Flashcard — tap to flip"
  }, [ front, backFace ]);

  screen.appendChild(h("div", { class: "card-wrap" }, [ cardEl ]));

  screen.appendChild(h("div", { class: "action-bar" }, [
    h("div", { class: "action-group" }, [
      h("button", {
        class: "icon-btn" + (fav ? " active" : ""),
        dataset: { role: "star" },
        onclick: (e) => { e.stopPropagation(); handleFavorite(); },
        "aria-label": "Star card",
        title: "Star (copy to this subject's Favorites)"
      }, fav ? "★ Starred" : "☆ Star"),
      h("button", {
        class: "icon-btn" + (flg ? " active" : ""),
        dataset: { role: "flag" },
        onclick: (e) => { e.stopPropagation(); handleFlag(); },
        "aria-label": "Flag card",
        title: "Flag (copy to the global Flagged pile)"
      }, flg ? "⚑ Flagged" : "⚐ Flag")
    ]),
    h("div", { class: "action-group" }, [
      h("button", { class: "nav-btn", onclick: prevCard, disabled: state.index === 0 }, "Prev"),
      h("button", { class: "nav-btn", onclick: nextCard, disabled: state.index >= state.cards.length - 1 }, "Next")
    ])
  ]));

  app.appendChild(screen);
}

// Light inline formatting for back-of-card lines: **bold** and *italic*.
// Everything else is escaped so raw HTML in card data can't break out.
function renderInline(str) {
  const esc = String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  return esc
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/(^|[^*])\*([^*]+)\*(?!\*)/g, "$1<em>$2</em>");
}

// ============================================================
// NAVIGATION + ACTIONS
// ============================================================
function goHome() {
  Object.assign(state, { view: "home", subject: null, deckType: null, cards: [], index: 0, flipped: false });
  render();
}
function goToSubject(subject) {
  Object.assign(state, { view: "subject", subject });
  render();
}
function goToDeck(subject, deckType) {
  Object.assign(state, { view: "deck", subject, deckType, index: 0, flipped: false });
  loadDeck();
  render();
}
function loadDeck() {
  if (state.deckType === "main") state.cards = cardsForSubject(state.subject);
  else if (state.deckType === "favorites") state.cards = favoritesForSubject(state.subject);
  else if (state.deckType === "flagged") state.cards = flaggedCards();
}
function flipCard() {
  state.flipped = !state.flipped;
  const c = document.querySelector(".card");
  if (c) c.classList.toggle("flipped", state.flipped);
}
function prevCard() {
  if (state.index > 0) { state.index--; state.flipped = false; render(); }
}
function nextCard() {
  if (state.index < state.cards.length - 1) { state.index++; state.flipped = false; render(); }
}
function handleFavorite() {
  const card = state.cards[state.index];
  if (!card) return;
  toggleFavorite(card);
  if (state.deckType === "favorites") {
    loadDeck();
    if (state.index >= state.cards.length) state.index = Math.max(0, state.cards.length - 1);
  }
  render();
}
function handleFlag() {
  const card = state.cards[state.index];
  if (!card) return;
  toggleFlag(card);
  if (state.deckType === "flagged") {
    loadDeck();
    if (state.index >= state.cards.length) state.index = Math.max(0, state.cards.length - 1);
  }
  render();
}
function shuffleDeck() {
  const arr = state.cards.slice();
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  state.cards = arr;
  state.index = 0;
  state.flipped = false;
  render();
}

// ============================================================
// INPUT: keyboard (desktop) and swipe (mobile)
// ============================================================
document.addEventListener("keydown", (e) => {
  if (state.view !== "deck" || state.cards.length === 0) return;
  if (e.key === "ArrowLeft") { e.preventDefault(); prevCard(); }
  else if (e.key === "ArrowRight") { e.preventDefault(); nextCard(); }
  else if (e.key === " " || e.key === "Enter") { e.preventDefault(); flipCard(); }
});

let touchStartX = null, touchStartY = null;
document.addEventListener("touchstart", (e) => {
  if (state.view !== "deck") return;
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
}, { passive: true });
document.addEventListener("touchend", (e) => {
  if (state.view !== "deck" || touchStartX === null) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  touchStartX = null;
  touchStartY = null;
  // Only treat as swipe if horizontal motion dominates and exceeds threshold
  if (Math.abs(dx) < 55 || Math.abs(dx) < Math.abs(dy) * 1.4) return;
  if (dx < 0) nextCard(); else prevCard();
}, { passive: true });

// ============================================================
// BOOT
// ============================================================
render();
</script>
</body>
</html>
